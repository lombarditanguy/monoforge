      <stop offset="0%" stop-color="#ff5a1f" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff5a1f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0a0a0b"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- wheel graphic -->
