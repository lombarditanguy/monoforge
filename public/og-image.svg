  <text x="90" y="230" font-family="Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="4" fill="#ff7a45">MONOFORGE</text>
  <text x="90" y="320" font-family="Arial, sans-serif" font-size="64" font-weight="800" fill="#f3f1ec">Jantes forgées</text>
  <text x="90" y="392" font-family="Arial, sans-serif" font-size="64" font-weight="800" fill="#f3f1ec">sur mesure.</text>
  <text x="90" y="452" font-family="Arial, sans-serif" font-size="27" fill="#a9a9b2">Toute taille. Toute forme. Une seule contrainte : la vôtre.</text>
