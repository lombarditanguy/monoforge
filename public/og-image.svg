    <circle r="230" fill="none" stroke="#303036" stroke-width="1.5"/>
    <circle r="196" fill="none" stroke="#303036" stroke-width="1"/>
    <g stroke="#a9a9b2" stroke-width="6" stroke-linecap="round" opacity="0.6">
      <line x1="0" y1="-52" x2="0" y2="-180"/>
      <line x1="49.4" y1="-16.1" x2="171.2" y2="-55.7"/>
      <line x1="30.5" y1="42.1" x2="105.8" y2="145.6"/>
